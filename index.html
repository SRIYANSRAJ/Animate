<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Optimized Scroll Frame Player</title>
  <style>
    :root {
      --bg: #0b0b0d;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Keeps the canvas fixed to the viewport while scrolling */
    .scroller-container {
      position: relative;
      height: 400vh;
      /* Control overall scroll length/speed here */
    }

    .canvas-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      pointer-events: none;
    }

    canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>

<body>

  <div class="scroller-container" id="scrollContainer">
    <div class="canvas-wrapper">
      <canvas id="player"></canvas>
    </div>
  </div>

  <script>
    /* Configuration */
    const TOTAL_FRAMES = 158;// 0000..0191
    const FILE_PREFIX = 'frame_';
    const FILE_EXT = '.jpg';
    const PAD = 4;

    const CANVAS = document.getElementById('player');
    const CTX = CANVAS.getContext('2d', { alpha: false }); // performance optimization: disable alpha transparency
    const CONTAINER = document.getElementById('scrollContainer');

    let frameBitmaps = new Array(TOTAL_FRAMES).fill(null);
    let lastRenderedFrame = -1;

    /* Utility to format filename */
    function frameName(i) {
      return FILE_PREFIX + String(i).padStart(PAD, '0') + FILE_EXT;
    }

    /* Hyper-fast fetching using Image Bitmaps */
    function loadFrame(index) {
      if (frameBitmaps[index]) return Promise.resolve(frameBitmaps[index]);
      const url = frameName(index);

      return fetch(url, { cache: 'force-cache' })
        .then(r => {
          if (!r.ok) throw new Error();
          return r.blob();
        })
        .then(blob => createImageBitmap(blob)) // Decodes off the main thread
        .then(bitmap => {
          frameBitmaps[index] = bitmap;
          return bitmap;
        })
        .catch(() => null);
    }

    /* Preloads frames aggressively in batches */
    async function preloadAllFrames() {
      const CHUNK_SIZE = 12;
      for (let i = 0; i < TOTAL_FRAMES; i += CHUNK_SIZE) {
        const batch = [];
        for (let j = i; j < Math.min(i + CHUNK_SIZE, TOTAL_FRAMES); j++) {
          batch.push(loadFrame(j));
        }
        await Promise.all(batch);
      }
    }

    /* Draws the frame maintaining aspect ratio */
    function drawFrame(index) {
      if (index === lastRenderedFrame) return;
      const bmp = frameBitmaps[index];
      if (!bmp) return;

      const cw = CANVAS.width, ch = CANVAS.height;
      const iw = bmp.width, ih = bmp.height;
      const scale = Math.max(cw / iw, ch / ih);
      const w = iw * scale, h = ih * scale;
      const x = (cw - w) / 2, y = (ch - h) / 2;

      CTX.drawImage(bmp, x, y, w, h);
      lastRenderedFrame = index;
    }

    /* Tracks scrolling fraction and updates canvas frame */
    function updateFrameOnScroll() {
      const scrollTop = window.scrollY;
      const maxScroll = CONTAINER.scrollHeight - window.innerHeight;
      if (maxScroll <= 0) return;

      const scrollFraction = Math.max(0, Math.min(1, scrollTop / maxScroll));
      // Map scroll progress (0 to 1) seamlessly to frame index
      const frameIndex = Math.min(TOTAL_FRAMES - 1, Math.floor(scrollFraction * TOTAL_FRAMES));

      if (frameBitmaps[frameIndex]) {
        drawFrame(frameIndex);
      } else {
        // Fallback: If image isn't loaded yet, fetch instantly and draw it
        loadFrame(frameIndex).then(() => drawFrame(frameIndex));
      }
    }

    /* Display setup optimization */
    function resizeCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      CANVAS.width = window.innerWidth * dpr;
      CANVAS.height = window.innerHeight * dpr;
      lastRenderedFrame = -1; // Reset to force repaint on size changes
      updateFrameOnScroll();
    }

    /* Init Core Execution Flow */
    (async function init() {
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // Load initial batch of frames so the screen doesn't start blank
      const initialBatch = [];
      for (let i = 0; i < 15; i++) initialBatch.push(loadFrame(i));
      await Promise.all(initialBatch);

      // Render first frame immediately
      drawFrame(0);

      // Listen for scroll shifts
      window.addEventListener('scroll', updateFrameOnScroll, { passive: true });

      // Run deep progressive caching asynchronously in the background
      preloadAllFrames();
    })();

    /* Memory Management */
    window.addEventListener('beforeunload', () => {
      for (let i = 0; i < frameBitmaps.length; i++) {
        if (frameBitmaps[i]) frameBitmaps[i].close();
      }
    });
  </script>
</body>

</html>
